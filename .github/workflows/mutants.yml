name: Mutants

# `cargo-mutants` performs mutation testing — it perturbs the source and
# checks whether the test suite catches the change. It's slow (linear in
# the number of mutants × test runtime), so we run it weekly and on demand.
#
# Status: **monitoring only.** We don't have a kill-rate baseline yet, so
# surviving mutants will not fail CI. Once a steady kill-rate is established,
# fail the job if it drops below the floor (e.g. via `--minimum-test-timeout`
# or by parsing `outcomes.json`).

on:
  schedule:
    # Mondays 08:00 UTC.
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutants:
    name: cargo mutants
    runs-on: ubuntu-latest
    # Mutation runs can be long; cap to 4h to avoid runaway billing.
    timeout-minutes: 240
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # taiki-e/install-action provides prebuilt cargo-mutants binaries.
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: cargo mutants
        # `--no-shuffle` makes runs reproducible.
        # `--timeout-multiplier 3.0` avoids false positives on slow tests.
        # We continue-on-error so the artifact uploads even on surviving
        # mutants — we don't enforce a kill rate yet.
        continue-on-error: true
        run: |
          cargo mutants --workspace \
            --no-shuffle \
            --timeout-multiplier 3.0 \
            --output target/mutants

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-${{ github.run_id }}
          path: target/mutants/
          retention-days: 30
