name: Coverage

# Runs `cargo llvm-cov` on every PR plus a weekly cadence so we have a long
# history of coverage data.
#
# Status: **monitored, not enforced.** We don't have a baseline yet, so
# coverage drops will not fail CI. Once we have a stable baseline (a few
# weeks of weekly runs and a steady number on `main`), add a threshold by
# passing `--fail-under-lines <NN>` to `cargo llvm-cov`. See CLAUDE.md for
# the target (80% workspace / 95% critical paths).

on:
  pull_request:
  schedule:
    # Mondays 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: cargo llvm-cov
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85 with llvm-tools-preview
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: llvm-tools-preview

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # taiki-e/install-action ships a prebuilt cargo-llvm-cov binary; this
      # is much faster than `cargo install` on every run.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage (HTML report)
        run: |
          cargo llvm-cov --workspace --all-features --branch --locked \
            --html --output-dir coverage

      - name: Coverage summary
        run: |
          cargo llvm-cov report --workspace --all-features --branch --summary-only \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14
