name: CI

# Main gate: every push to main and every PR runs the full lint + test bar.
#
# To extend the OS matrix later (macOS verification), change the `runs-on`
# field on the `test` job to `${{ matrix.os }}` and add:
#
#     strategy:
#       fail-fast: false
#       matrix:
#         os: [ubuntu-latest, macos-latest]
#
# Windows is intentionally excluded — `directories` is XDG-only and the
# Windows path resolution work hasn't been done.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace --all-features --locked
        run: cargo test --workspace --all-features --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85 with clippy
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rustfmt.toml uses nightly-only options (`imports_granularity`,
      # `group_imports`), so the formatting gate runs on nightly. The actual
      # build still uses Rust 1.85.
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: cargo +nightly fmt --check
        run: cargo +nightly fmt --check

  docs:
    name: docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo doc --no-deps
        run: cargo doc --workspace --all-features --no-deps --locked

  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check
