[workspace]
resolver = "2"
members = [
    "crates/sid",
    "crates/sid-core",
    "crates/sid-ui",
    "crates/sid-store",
    "crates/sid-job",
    "crates/sid-widgets",
    "crates/sid-git",
    "crates/sid-secrets",
    "crates/sid-sysinfo",
    "crates/sid-system",
    "crates/sid-db-clients",
    "crates/sid-ssh",
    "crates/sid-pty",
    "crates/sid-fx",
    "crates/sid-mcp",
]

[workspace.package]
version = "0.0.1"
edition = "2024"
rust-version = "1.85"
license = "GPL-3.0-only"
repository = "https://github.com/murphlmao/sid"
authors = ["Murphy Malcolm"]
# Internal workspace: the `sid` binary is the product; all crates use versionless
# path deps and are never published to crates.io. publish=false makes this intent
# explicit (and lets cargo-deny's allow-wildcard-paths exempt the path deps).
publish = false

[workspace.dependencies]
# Internal
sid-core = { path = "crates/sid-core" }
sid-ui = { path = "crates/sid-ui" }
sid-store = { path = "crates/sid-store" }
sid-job = { path = "crates/sid-job" }
sid-widgets = { path = "crates/sid-widgets" }
sid-git = { path = "crates/sid-git" }
sid-secrets = { path = "crates/sid-secrets" }
sid-sysinfo = { path = "crates/sid-sysinfo" }
sid-system = { path = "crates/sid-system" }
sid-db-clients = { path = "crates/sid-db-clients" }
sid-ssh = { path = "crates/sid-ssh" }
sid-pty = { path = "crates/sid-pty" }
sid-fx = { path = "crates/sid-fx" }
sid-mcp = { path = "crates/sid-mcp" }

# TUI
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }

# Async
tokio = { version = "1.47", features = ["rt-multi-thread", "macros", "sync", "signal", "time", "fs", "io-util", "test-util", "process"] }
tokio-util = "0.7"
futures = "0.3"

# Storage
redb = "4.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
postcard = { version = "1.1", features = ["use-std"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# Errors / logging
thiserror = "2"
anyhow = "1"
color-eyre = "0.6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
tracing-appender = "0.2"

# Git
git2 = { version = "0.21", default-features = false, features = ["vendored-libgit2"] }
walkdir = "2"

# SSH — russh 0.61 (keys live in `russh::keys`; the standalone russh-keys crate
# is obsolete and was dropped). Pinned >=0.61 to clear RUSTSEC-2026-0153/0154
# (CryptoVec allocation hardening). russh-sftp is version-independent of russh.
russh = "0.61"
russh-sftp = "2.3"

# PTY
portable-pty = "0.9"
vt100 = "0.16"

# Database clients
tokio-postgres = "0.7"
rusqlite = { version = "0.40", features = ["bundled", "column_decltype"] }
csv = "1.3"
async-trait = "0.1"

# System / network
sysinfo = { version = "0.39", default-features = false, features = ["system", "network", "disk", "user"] }
netstat2 = "0.11"
nix = { version = "0.29", features = ["signal", "process"] }

# Paths
directories = "6"

# Keyring / OS secret service.
# Secrets — keyring v4 split the library into `keyring-core` (the API) plus
# per-platform backend STORE crates that are registered at RUNTIME (the v3
# compile-time `features` model is gone). The `keyring` crate itself is now
# only sample/CLI code — we depend on `keyring-core` directly. CRITICAL: a
# backend store MUST be registered at startup (sid_secrets::install_default_backend)
# or keyring-core has no default store and every secret op fails — the runtime
# equivalent of the v3 mock-backend data-loss trap. Backend store crates are
# declared per-target in crates/sid-secrets/Cargo.toml:
#   Linux  → zbus-secret-service-keyring-store (pure-Rust zbus, no libdbus C dep)
#   macOS  → apple-native-keyring-store (Keychain)
keyring-core = "1"
# LOAD-BEARING FEATURES (same class of trap as keyring v3's mock backend):
# both store crates ship NO default features and fail to build without an
# explicit selection.
#   zbus: `rt-async-io-crypto-rust` picks the async-io runtime + pure-Rust
#   crypto. async-io (NOT tokio) is deliberate: sid calls the sync keyring API
#   from inside its tokio runtime at startup, and a tokio-based blocking
#   wrapper would panic "runtime within a runtime"; async-io block_on is
#   runtime-independent. crypto-rust avoids an OpenSSL C dependency.
#   apple: `keychain` = the legacy login keychain (available to unsandboxed
#   apps); `protected` would require sandbox entitlements sid does not have.
zbus-secret-service-keyring-store = { version = "1", features = ["rt-async-io-crypto-rust"] }
apple-native-keyring-store = { version = "1", features = ["keychain"] }

# System / subprocess utilities
which = "7"
shell-words = "1.1"

# Random / animation
rand = "0.9"
rand_chacha = "0.9"

# Test
insta = { version = "1", features = ["yaml"] }
proptest = "1"
tempfile = "3"

# MCP server SDK (Rust). Used by sid-mcp.
rmcp = { version = "1.7", features = ["server", "macros", "transport-io"] }
schemars = "0.8"

# Performance / chaos / model-checking
criterion = { version = "0.7", default-features = false, features = ["html_reports", "cargo_bench_support"] }
loom = "0.7"
fail = "0.5"
dhat = "0.3"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
