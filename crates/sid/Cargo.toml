[package]
name = "sid"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "sid"
path = "src/main.rs"

# CI / coverage hook — activating this feature is a no-op for the normal build;
# it exists so that `cargo llvm-cov --features coverage` can instrument the
# binary without any extra feature-gating in the source.  Add
# `--features coverage` to your `cargo llvm-cov` invocation in CI.
[features]
coverage = []

[dependencies]
sid-core.workspace = true
sid-ui.workspace = true
sid-store.workspace = true
sid-job.workspace = true
sid-widgets.workspace = true
sid-git.workspace = true
sid-sysinfo.workspace = true
sid-system.workspace = true
sid-db-clients.workspace = true
sid-secrets.workspace = true
sid-ssh.workspace = true
sid-pty.workspace = true
sid-fx.workspace = true
sid-mcp.workspace = true
serde_json.workspace = true
shell-words.workspace = true
csv.workspace = true

ratatui.workspace = true
crossterm.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "time"] }
clap.workspace = true

anyhow.workspace = true
color-eyre.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tracing-appender.workspace = true
directories.workspace = true
futures.workspace = true

[dev-dependencies]
tempfile.workspace = true
criterion.workspace = true
which.workspace = true
sid-core.workspace = true
sid-secrets.workspace = true
sid-db-clients.workspace = true
sid-pty.workspace = true
async-trait.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "time", "test-util"] }
insta.workspace = true

[[bench]]
name = "draw_bench"
harness = false
